name: Discord Bot Runner (resilient)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  bot:
    runs-on: ubuntu-22.04
    timeout-minutes: 355

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm install

      # Script que reinicia o bot se ele cair
      - name: Create runner script
        run: |
          cat << 'EOF' > run-bot.sh
          #!/usr/bin/env bash
          set -e

          echo "Starting bot supervisor..."

          while true; do
            echo "Launching bot..."
            node index.js
            EXIT_CODE=$?

            echo "Bot exited with code $EXIT_CODE"
            echo "Restarting in 5 seconds..."
            sleep 5
          done
          EOF

          chmod +x run-bot.sh

      - name: Start bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
        run: |
          nohup ./run-bot.sh > bot.log 2>&1 &
          echo $! > bot.pid
          echo "Bot PID:"
          cat bot.pid

      - name: Show live log (background)
        run: |
          nohup bash -c 'tail -f bot.log' &

      - name: Keep alive (~5h45)
        run: |
          for i in $(seq 1 345); do
            echo "Bot running minute $i"
            sleep 60
          done

      - name: Dispatch next run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Starting next workflow run..."
          gh api repos/${{ github.repository }}/actions/workflows/bot.yml/dispatches \
            -X POST \
            -f ref="${{ github.ref_name }}"

      - name: Grace period
        run: |
          echo "Waiting 45s for new runner to start..."
          sleep 45

      - name: Stop bot
        run: |
          if [ -f bot.pid ]; then
            kill "$(cat bot.pid)" || true
          fi
